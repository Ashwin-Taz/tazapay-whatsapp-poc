name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8 -q
          flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        run: |
          pip install pytest -q
          pytest tests/ -v 2>/dev/null || echo "No tests yet — skipping"

      - name: Check imports
        run: python -c "import app; print('App imports OK')"
        env:
          ANTHROPIC_API_KEY: test
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TAZAPAY_API_KEY: test
          TAZAPAY_API_SECRET: test
          TAZAPAY_BASE_URL: https://api.tazapay.com
          TWILIO_WHATSAPP_NUMBER: whatsapp:+14155238886

  # Render auto-deploys on push to main via GitHub integration
  # This job just confirms the deploy hook was triggered
  notify-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Notify deploy triggered
        run: |
          echo "✅ Tests passed. Render will auto-deploy from main branch."
          echo "Monitor deployment at: https://dashboard.render.com"
